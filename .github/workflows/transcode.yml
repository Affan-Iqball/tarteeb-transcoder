name: Transcode Video to HLS

on:
  repository_dispatch:
    types: [transcode-video]

jobs:
  transcode:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install gdown
          sudo apt-get update
          sudo apt-get install -y ffmpeg curl

      - name: Set up Supabase Status Updater script
        run: |
          cat << 'EOF' > update_status.sh
          #!/bin/bash
          STATUS=$1
          MSG=$2
          PATH_VAL=$3
          
          curl -X PATCH "$SUPABASE_URL/rest/v1/resource_requests?id=eq.$REQUEST_ID" \
          -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
          -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
          -H "Content-Type: application/json" \
          -d "{\"status\": \"$STATUS\", \"error_message\": \"$MSG\", \"b2_output_path\": \"$PATH_VAL\"}"
          EOF
          chmod +x update_status.sh
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          REQUEST_ID: ${{ github.event.client_payload.request_id }}

      - name: Download Video from Google Drive
        id: download
        run: python download.py "${{ github.event.client_payload.drive_url }}"

      - name: Handle Download Failure
        if: failure() && steps.download.outcome == 'failure'
        run: ./update_status.sh "failed" "Failed to download video from Google Drive. Ensure the link is set to 'Anyone with the link can view'." ""

      - name: Transcode to HLS (720p)
        id: transcode
        run: |
          mkdir hls_output
          # Compress to 720p (scale=-2:720) and segment every 10 seconds
          ffmpeg -i raw_video.mp4 \
            -c:v libx264 -preset fast -crf 23 -vf scale=-2:720 \
            -c:a aac -b:a 128k \
            -hls_time 10 -hls_playlist_type vod -hls_segment_filename 'hls_output/segment_%03d.ts' \
            hls_output/playlist.m3u8

      - name: Handle Transcode Failure
        if: failure() && steps.transcode.outcome == 'failure'
        run: ./update_status.sh "failed" "FFmpeg failed to transcode the video. The file might be corrupted or unsupported." ""

      - name: Delete Raw Video (Free up disk space for upload)
        run: rm raw_video.mp4

      - name: Install Backblaze B2 CLI
        run: pip install b2

      - name: Authorize B2
        run: b2 account authorize ${{ secrets.B2_APPLICATION_KEY_ID }} ${{ secrets.B2_APPLICATION_KEY }}

      - name: Upload HLS to B2
        id: upload
        env:
          SUBJECT_SLUG: ${{ github.event.client_payload.subject_slug }}
          LESSON_ID: ${{ github.event.client_payload.lesson_id }}
          BUCKET_NAME: ${{ secrets.B2_BUCKET_NAME }}
        run: |
          TARGET_DIR="subjects/$SUBJECT_SLUG/lesson_$LESSON_ID"
          b2 sync hls_output/ b2://$BUCKET_NAME/$TARGET_DIR/
          echo "B2_TARGET_DIR=$TARGET_DIR" >> $GITHUB_ENV

      - name: Handle Upload Failure
        if: failure() && steps.upload.outcome == 'failure'
        run: ./update_status.sh "failed" "Failed to upload HLS files to Backblaze B2." ""

      - name: Mark Request as Completed in Supabase
        run: ./update_status.sh "completed" "" "${{ env.B2_TARGET_DIR }}"
