name: Transcode Video Pipeline (Batch Support)

on:
  repository_dispatch:
    types: [transcode_video]

jobs:
  prepare_batch:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.prepare.outputs.matrix }}
      has_videos: ${{ steps.prepare.outputs.has_videos }}
    steps:
      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq
          pip install gdown

      - name: Setup Backblaze B2 CLI
        run: |
          curl -L https://github.com/Backblaze/B2_Command_Line_Tool/releases/latest/download/b2-linux -o b2
          chmod +x b2
          sudo mv b2 /usr/local/bin/
          b2 account authorize ${{ secrets.B2_APPLICATION_KEY_ID }} ${{ secrets.B2_APPLICATION_KEY }}

      - name: Notify Supabase (Processing)
        run: |
          curl -sSf -X PATCH '${{ secrets.SUPABASE_URL }}/rest/v1/resource_requests?id=eq.${{ github.event.client_payload.request_id }}' \
          -H 'apikey: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}' \
          -H 'Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}' \
          -H 'Content-Type: application/json' \
          -d '{"status": "processing"}'

      - name: Run prepare_batch.py
        id: prepare
        run: |
          python prepare_batch.py \
            --drive_url "${{ github.event.client_payload.drive_url }}" \
            --request_id "${{ github.event.client_payload.request_id }}" \
            --subject_slug "${{ github.event.client_payload.subject_slug }}" \
            --b2_bucket "${{ secrets.B2_BUCKET_NAME }}" \
            ${{ github.event.client_payload.file_ids_only && format('--file_ids_only ''{0}''', github.event.client_payload.file_ids_only) || '' }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

  transcode_matrix:
    needs: prepare_batch
    if: ${{ needs.prepare_batch.outputs.has_videos == 'true' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        video: ${{ fromJSON(needs.prepare_batch.outputs.matrix) }}
    steps:
      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install Transcoding Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          pip install gdown

      - name: Setup Backblaze B2 CLI
        run: |
          curl -L https://github.com/Backblaze/B2_Command_Line_Tool/releases/latest/download/b2-linux -o b2
          chmod +x b2
          sudo mv b2 /usr/local/bin/
          b2 account authorize ${{ secrets.B2_APPLICATION_KEY_ID }} ${{ secrets.B2_APPLICATION_KEY }}

      - name: Log Download Start
        run: |
          curl -sSf -X POST '${{ secrets.SUPABASE_URL }}/rest/v1/request_logs' \
          -H 'apikey: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}' \
          -H 'Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}' \
          -H 'Content-Type: application/json' \
          -d "{\"request_id\": \"${{ github.event.client_payload.request_id }}\", \"message\": \"Downloading raw video from Drive (ID: ${{ matrix.video.file_id }})...\"}"

      - name: Download Raw Video
        run: |
          gdown "https://drive.google.com/uc?id=${{ matrix.video.file_id }}" -O "raw_video${{ matrix.video.ext }}" --no-cookies

      - name: Log Transcode Start
        run: |
          curl -sSf -X POST '${{ secrets.SUPABASE_URL }}/rest/v1/request_logs' \
          -H 'apikey: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}' \
          -H 'Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}' \
          -H 'Content-Type: application/json' \
          -d "{\"request_id\": \"${{ github.event.client_payload.request_id }}\", \"message\": \"Transcoding ${{ matrix.video.clean_name }} to HLS format...\"}"

      - name: Transcode to HLS
        run: |
          mkdir -p "hls_output/${{ matrix.video.clean_name }}"
          ffmpeg -nostdin -i "raw_video${{ matrix.video.ext }}" \
            -vf "scale=-2:720" -c:v libx264 -crf 23 -preset fast \
            -force_key_frames "expr:gte(t,n_forced*10)" -sc_threshold 0 \
            -c:a aac -b:a 128k -ac 2 \
            -hls_time 10 -hls_playlist_type vod \
            -hls_segment_filename "hls_output/${{ matrix.video.clean_name }}/segment_%03d.ts" \
            "hls_output/${{ matrix.video.clean_name }}/playlist.m3u8"

      - name: Log Upload Start
        run: |
          curl -sSf -X POST '${{ secrets.SUPABASE_URL }}/rest/v1/request_logs' \
          -H 'apikey: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}' \
          -H 'Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}' \
          -H 'Content-Type: application/json' \
          -d "{\"request_id\": \"${{ github.event.client_payload.request_id }}\", \"message\": \"Uploading processed HLS chunks to B2 Storage (${{ matrix.video.clean_name }})...\"}"

      - name: Upload HLS to B2
        run: |
          b2 sync "hls_output/${{ matrix.video.clean_name }}/" "b2://${{ secrets.B2_BUCKET_NAME }}/subjects/${{ github.event.client_payload.subject_slug }}/batch_uploads/${{ matrix.video.clean_name }}/"

      - name: Log Transcode Complete
        run: |
          curl -sSf -X POST '${{ secrets.SUPABASE_URL }}/rest/v1/request_logs' \
          -H 'apikey: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}' \
          -H 'Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}' \
          -H 'Content-Type: application/json' \
          -d "{\"request_id\": \"${{ github.event.client_payload.request_id }}\", \"message\": \"Video ${{ matrix.video.clean_name }} completed successfully!\"}"

  finalize_batch:
    needs: [prepare_batch, transcode_matrix]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Notify Supabase (Success)
        if: ${{ needs.prepare_batch.result == 'success' && (needs.prepare_batch.outputs.has_videos == 'false' || needs.transcode_matrix.result == 'success') }}
        run: |
          curl -sSf -X PATCH '${{ secrets.SUPABASE_URL }}/rest/v1/resource_requests?id=eq.${{ github.event.client_payload.request_id }}' \
          -H 'apikey: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}' \
          -H 'Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}' \
          -H 'Content-Type: application/json' \
          -d '{"status": "completed", "b2_output_path": "subjects/${{ github.event.client_payload.subject_slug }}/batch_uploads", "error_message": null}'

      - name: Notify Supabase (Failed)
        if: ${{ !(needs.prepare_batch.result == 'success' && (needs.prepare_batch.outputs.has_videos == 'false' || needs.transcode_matrix.result == 'success')) }}
        run: |
          curl -sSf -X PATCH '${{ secrets.SUPABASE_URL }}/rest/v1/resource_requests?id=eq.${{ github.event.client_payload.request_id }}' \
          -H 'apikey: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}' \
          -H 'Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}' \
          -H 'Content-Type: application/json' \
          -d '{"status": "failed", "error_message": "Transcoding job failed. Please check GitHub Action logs."}'
